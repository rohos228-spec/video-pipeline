services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-video}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-video}
      POSTGRES_DB: ${POSTGRES_DB:-video}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-video}"]
      interval: 5s
      timeout: 3s
      retries: 10

  app:
    build:
      context: .
      dockerfile: docker/Dockerfile
    restart: unless-stopped
    env_file: .env
    environment:
      POSTGRES_HOST: postgres
      BROWSER_CDP_URL: ${BROWSER_CDP_URL:-http://host.docker.internal:29229}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./app:/app/app
      - ./prompts:/app/prompts
      - ./data:/data
      - ./alembic:/app/alembic
      - ./alembic.ini:/app/alembic.ini
    depends_on:
      postgres:
        condition: service_healthy
    command: ["python", "-m", "app.main"]

  worker:
    build:
      context: .
      dockerfile: docker/Dockerfile
    restart: unless-stopped
    env_file: .env
    environment:
      POSTGRES_HOST: postgres
      BROWSER_CDP_URL: ${BROWSER_CDP_URL:-http://host.docker.internal:29229}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./app:/app/app
      - ./prompts:/app/prompts
      - ./data:/data
    depends_on:
      postgres:
        condition: service_healthy
    command: ["python", "-m", "app.worker"]

volumes:
  postgres_data:
